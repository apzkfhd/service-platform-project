<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gogaba-로그인</title>
    <!--  -->
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/subdetail.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <!--  -->
    <div class="wrap">
      <!-- header -->
      <header class="header">
        <div class="inner">
          <div class="left-menu">
            <div class="logo">
              <a href="/index.html">
                <img src="assets/image/Logo-last.png" alt="logo-img" />
              </a>
            </div>
            <a href="subpagelist.html">
              <div class="all-view">
                <p>전체 보기</p>
              </div>
            </a>
          </div>
          <!--  -->
          <div class="right-menu">
            <div class="search-box">
              <label for="searchInput" class="sr-only"></label>
              <input
                id="searchInput"
                type="text"
                placeholder="어떤 촬영지를 찾으시나요!"
                autocomplete="off"
              />
              <div class="search-icon">
                <i class="fa-solid fa-search"></i>
              </div>
            </div>
            <a href="login.html">
              <div class="icon-my">
                <i class="fa-solid fa-user"></i>
              </div>
            </a>
            <a href="mysetting.html">
              <div class="icon-gear">
                <i class="fa-solid fa-gear"></i>
              </div>
            </a>
          </div>
          <!-- tablet,mobile -->
          <div class="mb-menu">
            <div class="search-icon">
              <i class="fa-solid fa-search"></i>
            </div>
            <!--  -->
            <div class="menu-icon">
              <i class="fa-solid fa-bars"></i>
            </div>
          </div>
        </div>
      </header>
      <!-- login-contact -->
      <section class="auth-section">
        <div class="inner">
          <div class="auth-container">
            <h1>로그인</h1>
            <form id="loginForm" class="auth-form" novalidate>
              <div class="form-group">
                <label for="email">Email:</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  autocomplete="email"
                  placeholder="Enter email:"
                  required
                />

                <div class="form-error" id="emailError"></div>
              </div>

              <div class="form-group">
                <label for="password">Password:</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="Enter password:"
                  required
                  autocomplete="new-password"
                />

                <div class="form-error" id="passwordError"></div>
              </div>

              <button class="login-btn">
                <a href="mypage.html">로그인</a>
              </button>
            </form>

            <div class="auth-footer">
              <p>계정이 잊어버리셨나요? <a href="errorpage.html">아이디/비밀번호 찾기</a></p>
              <p>계정이 없으신가요? <a href="signup.html">회원가입</a></p>
            </div>
          </div>
        </div>
      </section>
      <!-- footer -->
      <footer class="footer-section">
        <div class="inner">
          <div class="footer-m">
            <ul>
              <li>개인정보처리방침</li>
              <li>이용약관</li>
              <li>사업자 등록번호</li>
            </ul>
            <div class="copyright">Copyright © 2026 Gogaba. All rights reserved.</div>
          </div>
          <ul class="sns-list">
            <li>
              <a href="#"><img src="assets/icon/instar.png" alt="instar-icon" /></a>
            </li>
            <li>
              <a href="#"><img src="assets/icon/git.png" alt="git-icon" /></a>
            </li>
          </ul>
        </div>
      </footer>
    </div>

    <!--  -->
    <!-- fontawsome -->
    <script src="https://kit.fontawesome.com/c90d92266a.js" crossorigin="anonymous"></script>
  </body>
</html>
