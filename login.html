<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gogaba-로그인</title>
    <!--  -->
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/subdetail.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <!--  -->
    <div class="wrap">
      <!-- header -->
      <header class="header">
        <div class="inner">
          <div class="left-menu">
            <div class="logo">
              <a href="index.html">
                <img src="assets/image/Logo-last.png" alt="logo-img" />
              </a>
            </div>
            <!--  -->
            <nav class="nav">
              <div class="gnb">
                <div class="menu-item">
                  <a href="#">영화</a>
                  <div class="sub-menu">
                    <div class="sub-inner">
                      <a href="subpagelist.html">전체보기</a>
                      <a href="errorpage.html">최신장소</a>
                      <a href="errorpage.html">인기장소</a>
                      <a href="errorpage.html">유명장소</a>
                    </div>
                  </div>
                </div>
                <div class="menu-item">
                  <a href="#">드라마</a>
                  <div class="sub-menu">
                    <div class="sub-inner">
                      <a href="subpagelist.html">전체보기</a>
                      <a href="errorpage.html">최신장소</a>
                      <a href="errorpage.html">인기장소</a>
                      <a href="errorpage.html">유명장소</a>
                    </div>
                  </div>
                </div>
              </div>
            </nav>
            <!--  -->
          </div>
          <!--  -->
          <div class="right-menu">
            <div class="search-box">
              <label for="searchInput" class="sr-only"></label>
              <input
                id="searchInput"
                type="text"
                placeholder="어떤 촬영지를 찾으시나요?"
                autocomplete="off"
              />
              <div class="search-icon">
                <i class="fa-solid fa-search"></i>
              </div>
            </div>
            <a href="login.html">
              <div class="icon-my">
                <i class="fa-solid fa-user"></i>
              </div>
            </a>
            <!-- <a href="login.html">
              <div class="icon-gear">
                <i class="fa-solid fa-gear"></i>
              </div>
            </a> -->
          </div>
          <!-- tablet,mobile -->
          <div class="mb-menu">
            <div class="search-icon">
              <i class="fa-solid fa-search"></i>
            </div>
            <!--  -->
            <a href="login.html">
              <div class="user-icon">
                <i class="fa-solid fa-user"></i>
              </div>
            </a>
          </div>
        </div>
      </header>
      <!-- login-contact -->
      <section class="auth-section">
        <div class="inner">
          <div class="auth-container">
            <h1>로그인</h1>
            <form id="loginForm" class="auth-form" novalidate>
              <div class="form-group">
                <label for="email">이메일:</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  autocomplete="email"
                  placeholder="example@email.com"
                  required
                />

                <div class="form-error" id="emailError"></div>
              </div>

              <div class="form-group">
                <label for="password">비밀번호:</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  placeholder="********"
                  required
                  autocomplete="new-password"
                />

                <div class="form-error" id="passwordError"></div>
              </div>

              <a href="mysetting.html">
                <div class="login-btn">로그인</div>
              </a>
            </form>

            <div class="auth-footer">
              <p>계정이 잊어버리셨나요? <a href="errorpage.html">아이디/비밀번호 찾기</a></p>
              <p>계정이 없으신가요? <a href="signup.html">회원가입</a></p>
            </div>
          </div>
        </div>
      </section>
      <!-- footer -->
      <footer class="footer-section">
        <div class="inner">
          <div class="footer-m">
            <ul>
              <li>개인정보처리방침</li>
              <li>이용약관</li>
              <li>사업자 등록번호</li>
            </ul>
            <div class="copyright">Copyright © 2026 Gogaba. All rights reserved.</div>
          </div>
          <ul class="sns-list">
            <li>
              <a href="errorpage.html">
                <i class="fa-brands fa-instagram"></i>
              </a>
            </li>
            <li>
              <a href="errorpage.html">
                <i class="fa-brands fa-github"></i>
              </a>
            </li>
          </ul>
        </div>
      </footer>
    </div>

    <!--  -->
    <!-- fontawsome -->
    <script src="https://kit.fontawesome.com/c90d92266a.js" crossorigin="anonymous"></script>
    <!-- <script src="js/header.js"></script> -->
  </body>
</html>
