<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gogaba-회원가입</title>
    <!--  -->
    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/main.css" />
    <link rel="stylesheet" href="styles/subdetail.css" />
    <link rel="stylesheet" href="styles/components.css" />
  </head>
  <body>
    <div class="wrap">
      <!-- header -->
      <header class="header">
        <div class="inner">
          <div class="left-menu">
            <div class="logo">
              <a href="index.html">
                <img src="assets/image/Logo-last.png" alt="logo-img" />
              </a>
            </div>
            <!--  -->
            <ul class="gnb">
              <li class="menu-item" data-menu="movie">영화</li>
              <li class="menu-item" data-menu="drama">드라마</li>
            </ul>

            <div class="mega-menu">
              <ul class="menu-content">
                <li><a href="subpagelist.html">전체보기</a></li>
                <li><a href="errorpage.html">최신장소</a></li>
                <li><a href="errorpage.html">인기장소</a></li>
                <li><a href="errorpage.html">유명장소</a></li>
              </ul>
            </div>
            <!--  -->
          </div>
          <!--  -->
          <div class="right-menu">
            <div class="search-box">
              <label for="searchInput" class="sr-only"></label>
              <input
                id="searchInput"
                type="text"
                placeholder="어떤 촬영지를 찾으시나요!"
                autocomplete="off"
              />
              <div class="search-icon">
                <i class="fa-solid fa-search"></i>
              </div>
            </div>
            <a href="login.html">
              <div class="icon-my">
                <i class="fa-solid fa-user"></i>
              </div>
            </a>
            <!-- <a href="login.html">
              <div class="icon-gear">
                <i class="fa-solid fa-gear"></i>
              </div>
            </a> -->
          </div>
          <!-- tablet,mobile -->
          <div class="mb-menu">
            <div class="search-icon">
              <i class="fa-solid fa-search"></i>
            </div>
            <!--  -->
            <a href="login.html">
              <div class="user-icon">
                <i class="fa-solid fa-user"></i>
              </div>
            </a>
          </div>
        </div>
      </header>
      <!-- signup -->
      <section class="signup-section">
        <div class="inner">
          <div class="form">
            <div class="top">
              <h1>회원가입</h1>
            </div>
            <div class="search">
              <div class="enter">
                <label for="name">이름:</label>
                <input
                  type="name"
                  id="name"
                  name="name"
                  autocomplete="name"
                  placeholder="이름을 입력하세요:"
                  required
                />
              </div>
              <div class="enter">
                <label for="email">이메일:</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  autocomplete="email"
                  placeholder="example@email.com"
                  required
                />
                <div class="check-id">
                  <p>중복 확인</p>
                </div>
              </div>
              <div class="enter">
                <label for="password">비밀번호:</label>
                <input
                  type="password"
                  id="password"
                  name="password"
                  autocomplete="password"
                  placeholder="********"
                  required
                />
              </div>
              <div class="enter">
                <label for="confirm-password">비밀번호 확인:</label>
                <input
                  type="confirm-password"
                  id="confirm-password"
                  name="confirm-password"
                  autocomplete="confirm-password"
                  placeholder="********"
                  required
                />
              </div>
            </div>
            <div class="signup-btn">
              <a href="login.html"> 회원가입 </a>
            </div>
            <div class="auth-footer">
              <p>계정이 잊어버리셨나요? <a href="errorpage.html">아이디/비밀번호 찾기</a></p>
            </div>
          </div>
        </div>
      </section>
      <!-- footer -->
      <footer class="footer-section">
        <div class="inner">
          <div class="footer-m">
            <ul>
              <li>개인정보처리방침</li>
              <li>이용약관</li>
              <li>사업자 등록번호</li>
            </ul>
            <div class="copyright">Copyright © 2026 Gogaba. All rights reserved.</div>
          </div>
          <ul class="sns-list">
            <li>
              <a href="errorpage.html">
                <i class="fa-brands fa-instagram"></i>
              </a>
            </li>
            <li>
              <a href="errorpage.html">
                <i class="fa-brands fa-github"></i>
              </a>
            </li>
          </ul>
        </div>
      </footer>
    </div>
    <!-- fontawsome -->
    <script src="https://kit.fontawesome.com/c90d92266a.js" crossorigin="anonymous"></script>
    <script src="js/header.js"></script>
  </body>
</html>
